openapi: "3.0.3"
info:
  title: Common Responses v2
  description: >
    Schemas estándar de respuesta reutilizables en todas las APIs.
    Subir a Apicurio como: grupo=common, artifactId=common-responses
  version: "1.0.0"
paths: {}
components:
  schemas:

    Error:
      type: object
      description: Respuesta de error normalizada para cualquier fallo de la API
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Código de error en SCREAMING_SNAKE_CASE
          example: "RESOURCE_NOT_FOUND"
        message:
          type: string
          description: Descripción legible del error
          example: "El recurso solicitado no existe"
        details:
          type: array
          description: Errores de validación o detalles adicionales
          items:
            type: string
          example:
            - "El campo 'name' es obligatorio"
            - "El campo 'price' debe ser mayor que 0"
        traceId:
          type: string
          description: ID de trazabilidad para correlacionar con los logs
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

    Pagination:
      type: object
      description: Metadatos de paginación incluidos en respuestas de listas
      required:
        - page
        - pageSize
        - totalElements
        - totalPages
      properties:
        page:
          type: integer
          minimum: 0
          description: Página actual (base 0)
          example: 0
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          description: Número de elementos por página
          example: 20
        totalElements:
          type: integer
          minimum: 0
          description: Total de elementos que cumplen el filtro aplicado
          example: 150
        totalPages:
          type: integer
          minimum: 0
          description: Total de páginas disponibles
          example: 8

    PagedResponse:
      type: object
      description: >
        Envolvente genérico para respuestas paginadas.
        El campo 'data' se especializa via allOf en cada modelo de dominio.
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          description: Lista de elementos de la página actual
          items: {}
        pagination:
          $ref: "#/components/schemas/Pagination"

    SuccessResponse:
      type: object
      description: >
        Respuesta estándar para operaciones de escritura (POST/PUT/DELETE)
        que no devuelven un recurso completo como resultado.
      required:
        - success
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          description: Mensaje informativo sobre la operación realizada
          example: "Recurso creado correctamente"
